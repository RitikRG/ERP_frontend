<app-header>
  <div class="box">
    <div class="header-row">
      <h2>Add New Customer</h2>
    </div>

    <form (ngSubmit)="submit()" class="purchase-form">

      <div class="form-grid">

        <!-- Name -->
        <div class="form-group full-width">
          <label>Customer Name (Optional)</label>
          <input type="text" [(ngModel)]="customer.name" name="name" placeholder="Enter name">
        </div>

        <!-- Mobile -->
        <div class="form-group full-width">
          <label>Mobile Number <span style="color:red">*</span></label>
          <input type="text" [(ngModel)]="customer.mobile_number" name="mobile" placeholder="Enter mobile number">
        </div>

      </div>

      <div class="form-actions">
        <button class="submit-btn" type="submit">Add Customer</button>
      </div>

    </form>
  </div>
</app-header>
