<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.closed]="!sidebarOpen">
    <div class="sidebar-header">
      <h2>E</h2>
    </div>

    <nav class="sidebar-nav">
      <div class="aside"></div>
      <ul>
        <li *ngFor="let item of menuItems">
          <a href="{{item.route}}" (click)="item.children ? toggleSubMenu(item) : null">
            <i [class]="item.icon"></i> {{ item.label }}
            <span *ngIf="item.children" class="arrow" [class.open]="item.isOpen">▼</span>
          </a>
          
          <!-- Child Menu -->
          <ul *ngIf="item.children && item.isOpen" class="child-menu">
            <li *ngFor="let child of item.children">
              <a href="{{child.route}}"
                [class.active]="isChildActive(child.route)">
                <i [class]="child.icon"></i> {{ child.label }}
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>
  </aside>


  <!-- Main Content -->
  <div class="main">
    <!-- Top Navbar -->
    <header class="topbar">
      <button class="menu-btn" (click)="toggleSidebar()">
        <i class="fa fa-bars"></i>
      </button>

      <div class="search">
        <input type="text" placeholder="Search or type a command (Ctrl + O)" />
      </div>

      <div class="topbar-right">
        <a href="#" class="help">Help</a>
        <div class="profile">
          <img src="https://via.placeholder.com/32" alt="User" />
        </div>
      </div>
    </header>

    <main class="content">
      <ng-content></ng-content>
    </main>
  </div>
</div>
