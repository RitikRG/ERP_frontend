<div class="layout">
  <div
    class="sidebar-backdrop"
    *ngIf="isCompactViewport && sidebarOpen"
    (click)="toggleSidebar()"
  ></div>

  <aside class="sidebar" [class.closed]="!sidebarOpen" [class.compact]="isCompactViewport">
    <div class="sidebar-header">
      <div class="brand-mark">
        <img src="/images/logo.png" alt="RNR ERP logo" class="brand-logo" />
      </div>
      <div class="brand-copy">
        <h2>RNR ERP</h2>
        <p>Retail Management</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="aside"></div>
      <ul>
        <li *ngFor="let item of menuItems">
          <a href="{{ item.route }}" (click)="handleMenuClick(item, $event)">
            <i [class]="item.icon"></i>
            <span class="menu-label">{{ item.label }}</span>
            <span *ngIf="item.children" class="arrow" [class.open]="item.isOpen">▼</span>
          </a>

          <ul *ngIf="item.children && item.isOpen" class="child-menu">
            <li *ngFor="let child of item.children">
              <a
                href="{{ child.route }}"
                (click)="handleChildClick(child.route, $event)"
                [class.active]="isChildActive(child.route)"
              >
                <i [class]="child.icon"></i>
                <span class="menu-label">{{ child.label }}</span>
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" type="button" aria-label="Toggle navigation menu" (click)="toggleSidebar()">
          <i class="fa fa-bars"></i>
        </button>

        <div class="topbar-brand">
          <img src="/images/logo.png" alt="RNR ERP logo" class="topbar-brand-logo" />
          <div class="topbar-brand-copy">
            <strong>RNR ERP</strong>
            <span>Business Suite</span>
          </div>
        </div>
      </div>

      <div class="search">
        <input
          type="text"
          placeholder="Search modules, pages..."
          [(ngModel)]="searchText"
          (input)="onSearchChange()"
          (keydown.arrowDown)="moveActive(1)"
          (keydown.arrowUp)="moveActive(-1)"
          (keydown.enter)="selectActive()"
        />

        <ul *ngIf="showSearchResults" class="search-results">
          <li
            *ngFor="let r of filteredResults; let i = index"
            [class.active]="i === activeIndex"
            (click)="navigateTo(r.route)"
          >
            <i [class]="r.icon"></i> {{ r.label }}
            <span class="path">{{ r.parent }}</span>
          </li>
        </ul>
      </div>

      <div class="topbar-right">
        <div class="user-menu" (click)="toggleUserMenu()" (click)="$event.stopPropagation()" tabindex="0">
          <img src="https://cdn-icons-png.flaticon.com/512/630/630453.png" class="user-icon" />

          <div class="dropdown" *ngIf="showUserDropdown" (click)="$event.stopPropagation()">
            <div class="user-info">
              <h4>{{ user?.name }}</h4>
              <p>{{ user?.company }}</p>
            </div>

            <hr />

            <button *ngIf="canOpenSettings" class="dropdown-btn" (click)="navigateToSettings()">
              <i class="fa fa-cog"></i> Settings
            </button>

            <button class="dropdown-btn logout" (click)="logout()">
              <i class="fa fa-sign-out"></i> Logout
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <ng-content></ng-content>
    </main>
  </div>
</div>
