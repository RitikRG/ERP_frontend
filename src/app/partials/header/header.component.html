<div class="layout">
  <div
    class="sidebar-backdrop"
    *ngIf="isCompactViewport && sidebarOpen"
    (click)="toggleSidebar()"
  ></div>

  <aside class="sidebar" [class.closed]="!sidebarOpen" [class.compact]="isCompactViewport">
    <div class="sidebar-header">
      <div class="brand-mark">
        <img src="/images/logo.png" alt="RNR ERP logo" class="brand-logo" />
      </div>
      <div class="brand-copy">
        <h2>RNR ERP</h2>
        <p>Retail Management</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="aside"></div>
      <ul>
        <li *ngFor="let item of menuItems">
          <a href="{{ item.route }}" (click)="handleMenuClick(item, $event)">
            <i [class]="item.icon"></i>
            <span class="menu-label">{{ item.label }}</span>
            <span *ngIf="item.children" class="arrow" [class.open]="item.isOpen">▼</span>
          </a>

          <ul *ngIf="item.children && item.isOpen" class="child-menu">
            <li *ngFor="let child of item.children">
              <a
                href="{{ child.route }}"
                (click)="handleChildClick(child.route, $event)"
                [class.active]="isChildActive(child.route)"
              >
                <i [class]="child.icon"></i>
                <span class="menu-label">{{ child.label }}</span>
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>

    <!-- PWA Install Button -->
    <div class="sidebar-footer" *ngIf="canInstall">
      <button class="install-btn" (click)="installApp()" id="pwa-install-btn" aria-label="Install RNR ERP as an app">
        <i class="fa fa-download"></i>
        <span class="menu-label">Install as App</span>
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" type="button" aria-label="Toggle navigation menu" (click)="toggleSidebar()">
          <i class="fa fa-bars"></i>
        </button>

        <div class="topbar-brand">
          <img src="/images/logo.png" alt="RNR ERP logo" class="topbar-brand-logo" />
          <div class="topbar-brand-copy">
            <strong>RNR ERP</strong>
            <span>Business Suite</span>
          </div>
        </div>
      </div>

      <div class="search">
        <input
          type="text"
          placeholder="Search modules, pages..."
          [(ngModel)]="searchText"
          (input)="onSearchChange()"
          (keydown.arrowDown)="moveActive(1)"
          (keydown.arrowUp)="moveActive(-1)"
          (keydown.enter)="selectActive()"
        />

        <ul *ngIf="showSearchResults" class="search-results">
          <li
            *ngFor="let r of filteredResults; let i = index"
            [class.active]="i === activeIndex"
            (click)="navigateTo(r.route)"
          >
            <i [class]="r.icon"></i> {{ r.label }}
            <span class="path">{{ r.parent }}</span>
          </li>
        </ul>
      </div>

      <div class="topbar-right">
        
        <!-- NOtification Bell -->
        <div class="notification-wrapper" style="position: relative; cursor: pointer; margin-right: 20px;" (click)="toggleNotificationMenu($event)">
          <i class="fa fa-bell" style="font-size: 1.2rem; color: #555;"></i>
          <span class="badge" *ngIf="unreadCount > 0" style="position: absolute; top: -5px; right: -10px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold;">
            {{ unreadCount }}
          </span>

          <div class="dropdown notification-dropdown" *ngIf="showNotificationDropdown" (click)="$event.stopPropagation()" style="position: absolute; right: -10px; top: 35px; background: white; border: 1px solid #ddd; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; border-radius: 8px; z-index: 1000; padding: 10px;">
            <div class="dropdown-header" style="padding-bottom: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
              <strong style="font-size: 14px;">Notifications</strong>
            </div>
            <div class="notification-list" style="max-height: 300px; overflow-y: auto;">
              <div *ngIf="notifications.length === 0" style="padding: 15px; text-align: center; color: #777; font-size: 13px;">
                No unread notifications
              </div>
              <div *ngFor="let notif of notifications" (click)="onNotificationClick(notif, $event)" class="notification-item" style="padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s;" [style.background]="notif.isRead ? '#fff' : '#f9f9ff'">
                <div style="font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px;">{{ notif.title }}</div>
                <div style="font-size: 12px; color: #666; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">{{ notif.body }}</div>
                <div style="font-size: 10px; color: #999; margin-top: 5px;">{{ notif.createdAt | date:'short' }}</div>
              </div>
            </div>
            <div style="padding-top: 10px; text-align: center;">
              <button (click)="viewAllNotifications($event)" style="background: none; border: none; color: #0066cc; font-size: 13px; cursor: pointer;">View All</button>
            </div>
          </div>
        </div>

        <div class="user-menu" (click)="toggleUserMenu()" (click)="$event.stopPropagation()" tabindex="0">
          <img src="https://cdn-icons-png.flaticon.com/512/630/630453.png" class="user-icon" />

          <div class="dropdown" *ngIf="showUserDropdown" (click)="$event.stopPropagation()">
            <div class="user-info">
              <h4>{{ user?.name }}</h4>
              <p>{{ user?.company }}</p>
            </div>

            <hr />

            <button *ngIf="canOpenSettings" class="dropdown-btn" (click)="navigateToSettings()">
              <i class="fa fa-cog"></i> Settings
            </button>

            <button class="dropdown-btn logout" (click)="logout()">
              <i class="fa fa-sign-out"></i> Logout
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <ng-content></ng-content>
    </main>
  </div>
</div>
